<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Expense Tracker · Personal Finance</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="container">
    <a href="https://portfolio-digitalheroes.vercel.app/" class="back-link">← Back to portfolio</a>

    <div class="header">
        <h1>📊 Expense Tracker</h1>
        <p class="sub">Track where your money goes. No sign-ups, no nonsense.</p>
    </div>

    <div class="stats-grid">
        <div class="stat-card green">
            <span class="stat-label">Total Income</span>
            <span class="stat-value" id="totalIncome">₹ 0</span>
        </div>
        <div class="stat-card red">
            <span class="stat-label">Total Expenses</span>
            <span class="stat-value" id="totalExpense">₹ 0</span>
        </div>
        <div class="stat-card blue">
            <span class="stat-label">Balance</span>
            <span class="stat-value" id="balance">₹ 0</span>
        </div>
    </div>

    <div class="add-section">
        <h3>➕ Add Transaction</h3>
        <div class="add-form">
            <div class="form-group">
                <label>Description</label>
                <input type="text" id="descInput" placeholder="e.g., Groceries" />
            </div>
            <div class="form-group">
                <label>Amount (₹)</label>
                <input type="number" id="amountInput" placeholder="0" min="0" step="0.01" />
            </div>
            <div class="form-group">
                <label>Type</label>
                <select id="typeInput">
                    <option value="income">Income</option>
                    <option value="expense">Expense</option>
                </select>
            </div>
            <button class="btn-add" id="addBtn">+ Add</button>
        </div>
    </div>

    <div class="list-section">
        <div class="list-header">
            <h3>📋 Transactions</h3>
            <button class="btn-clear" id="clearBtn">Clear All</button>
        </div>
        <div id="transactionList" class="transaction-list">
            <p class="empty-msg">No transactions yet. Add one above!</p>
        </div>
    </div>

    <div class="footer-meta">
        <span><span class="name">Dolraj Neupane</span> · samirneupane66@gmail.com</span>
        <button class="dh-btn" onclick="window.open('https://digitalheroesco.com','_blank')">
            Built for Digital Heroes
        </button>
    </div>
</div>

<script src="main.js"></script>
</body>
</html>
